query PrsWithCiStatus($query: String!) {
  search(query: $query, type: ISSUE, first: 100) {
    nodes {
      ... on PullRequest {
        id
        number
        url
        title
        headRefOid
        isDraft
        isInMergeQueue
        statusCheckRollup {
          state
        }
      }
    }
  }
}
