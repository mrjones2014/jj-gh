id: no-log-error
valid:
  - |
    log::warn!("recoverable problem: {error:#}");
invalid:
  - |
    log::error!("fatal problem: {error:#}");
---
id: no-space-joined-argv-in-log
valid:
  - |
    log::debug!("running {}", shell_words::join(args));
invalid:
  - |
    log::debug!("running {}", args.join(" "));
---
id: no-raw-subprocess-stderr-in-error
valid:
  - |
    return Err(anyhow!("{}", subprocess_error(&output.stderr)));
invalid:
  - |
    return Err(anyhow!("{}", String::from_utf8_lossy(&output.stderr)));
---
id: no-direct-process-spawn
valid:
  - |
    let out = proc::capture(&argv).await?;
  - |
    proc::stream(&argv).await?;
invalid:
  - |
    let out = cmd.output().await?;
  - |
    let status = cmd.status().await?;
  - |
    let child = cmd.spawn()?;
